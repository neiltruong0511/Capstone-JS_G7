<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
    integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <title>Admin Dashboard - Phone Store</title>
  <style>
    * { scroll-behavior: smooth; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .message-box { animation: slideDown 0.3s ease; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-500 to-purple-600">
  <!-- Header -->
  <header class="sticky top-0 z-50 bg-gradient-to-br from-indigo-500 to-purple-600 shadow-[0_10px_30px_rgba(102,126,234,0.4)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold text-white mb-1">Admin Dashboard</h1>
          <p class="text-blue-100 text-sm">Quản lý sản phẩm điện thoại</p>
        </div>
        <a href="index.html" class="inline-flex items-center gap-2 bg-white text-purple-600 px-6 py-3 rounded-lg font-semibold hover:shadow-lg transition-all hover:scale-105">
          ← Quay lại
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Stats Section -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white p-4 rounded-xl hover:shadow-lg hover:-translate-y-0.5 transition-all shadow-lg">
        <div class="text-2xl font-bold" id="totalProducts">0</div>
        <div class="text-xs opacity-90 mt-1">Tổng sản phẩm</div>
      </div>
      <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white p-4 rounded-xl hover:shadow-lg hover:-translate-y-0.5 transition-all shadow-lg">
        <div class="text-2xl font-bold">5</div>
        <div class="text-xs opacity-90 mt-1">Mỗi trang</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Form Section -->
      <section class="lg:col-span-1">
        <div class="bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all">
          <h2 class="mb-6 font-bold text-lg flex items-center gap-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-600">
            <span>➕</span> Thêm / Sửa Sản Phẩm
          </h2>
          <form id="productForm" class="space-y-4">
            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Tên sản phẩm *</label>
              <input id="name" type="text" placeholder="VD: iPhone 15 Pro" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
            </div>

            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Giá (VNĐ) *</label>
              <input id="price" type="number" min="0" placeholder="VD: 25000000" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
            </div>

            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Link ảnh *</label>
              <input id="img" type="text" placeholder="https://example.com/image.jpg" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
            </div>

            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Màn hình</label>
              <input id="screen" type="text" placeholder="VD: 6.1 inch OLED" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
            </div>

            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Camera sau</label>
              <input id="backCamera" type="text" placeholder="VD: 48MP" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
            </div>

            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Camera trước</label>
              <input id="frontCamera" type="text" placeholder="VD: 12MP" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
            </div>

            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Mô tả</label>
              <input id="desc" type="text" placeholder="Mô tả ngắn gọn về sản phẩm" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
            </div>

            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700 text-sm">Loại sản phẩm *</label>
              <select id="type" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)] appearance-none bg-[url('data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%2212%22%20height=%2212%22%20viewBox=%220%200%2012%2012%22%3E%3Cpath%20fill=%22%23667eea%22%20d=%22M10.293%203.293L6%207.586%201.707%203.293A1%201%200%2000.293%204.707l5%205a1%201%200%20001.414%200l5-5a1%201%200%2010-1.414-1.414z%22/%3E%3C/svg%3E')] bg-no-repeat bg-[right_12px_center] pr-9">
                <option value="">-- Chọn loại --</option>
                <option value="iphone">🍎 iPhone</option>
                <option value="Samsung">📱 Samsung</option>
              </select>
            </div>

            <div class="flex gap-3 pt-4">
              <button type="submit" id="btnSave" class="flex-1 bg-gradient-to-br from-indigo-500 to-purple-600 text-white font-semibold rounded-lg py-3 transition-all hover:-translate-y-0.5 hover:shadow-[0_8px_20px_rgba(102,126,234,0.4)] active:translate-y-0">
                ✓ Tạo mới
              </button>
              <button type="button" id="btnUpdate" class="flex-1 bg-gradient-to-br from-indigo-500 to-purple-600 text-white font-semibold rounded-lg py-3 transition-all hover:-translate-y-0.5 hover:shadow-[0_8px_20px_rgba(102,126,234,0.4)] active:translate-y-0 hidden">
                ✓ Cập nhật
              </button>
              <button type="button" id="btnReset" class="bg-gray-100 text-gray-700 font-semibold rounded-lg py-3 px-6 border-2 border-gray-200 transition-all hover:bg-gray-200 hover:border-gray-300">
                ↺ Reset
              </button>
            </div>
          </form>

          <!-- Message Box -->
          <div id="message" class="mt-4 rounded-lg px-5 py-4 font-medium"></div>
        </div>
      </section>

      <!-- List Section -->
      <section class="lg:col-span-2">
        <!-- Filter Bar -->
        <div class="bg-white p-5 rounded-xl mb-6 flex gap-4 flex-wrap items-end shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all">
          <div class="flex-1 min-w-full sm:min-w-0">
            <label class="block mb-2 font-semibold text-gray-700 text-sm">🔍 Tìm kiếm</label>
            <input id="keyword" type="search" placeholder="Tìm theo tên hoặc loại..." class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)]">
          </div>
          <button id="btnSearch" class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white font-semibold rounded-lg py-3 px-8 transition-all hover:-translate-y-0.5 hover:shadow-[0_8px_20px_rgba(102,126,234,0.4)]">
            Tìm
          </button>
          
          <div class="flex-1 min-w-full sm:min-w-0">
            <label class="block mb-2 font-semibold text-gray-700 text-sm">📊 Sắp xếp</label>
            <select id="sortDirection" class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 transition-all focus:border-indigo-500 focus:bg-gray-50 focus:shadow-[0_0_0_3px_rgba(102,126,234,0.1)] appearance-none bg-[url('data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%2212%22%20height=%2212%22%20viewBox=%220%200%2012%2012%22%3E%3Cpath%20fill=%22%23667eea%22%20d=%22M10.293%203.293L6%207.586%201.707%203.293A1%201%200%2000.293%204.707l5%205a1%201%200%20001.414%200l5-5a1%201%200%2010-1.414-1.414z%22/%3E%3C/svg%3E')] bg-no-repeat bg-[right_12px_center] pr-9">
              <option value="none">📋Xem tất cả</option>
              <option value="priceAsc">💰 Giá: Thấp → Cao</option>
              <option value="priceDesc">💰 Giá: Cao → Thấp</option>
            </select>
          </div>
        </div>

        <!-- Table Section -->
        <div class="rounded-xl overflow-hidden bg-white shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all">
          <table class="w-full">
            <thead class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white">
              <tr>
                <th class="p-4 font-semibold text-left">ID</th>
                <th class="p-4 font-semibold text-left">Tên sản phẩm</th>
                <th class="p-4 font-semibold text-left">Giá</th>
                <th class="p-4 font-semibold text-left">Loại</th>
                <th class="p-4 font-semibold text-left">Hành động</th>
              </tr>
            </thead>
            <tbody id="productTableBody" class="text-sm">
            </tbody>
          </table>
          <div id="emptyState" class="text-center py-12 px-6 text-gray-400 hidden">
            <div class="text-5xl mb-4">📭</div>
            <p>Không có sản phẩm nào</p>
          </div>
        </div>

        <!-- Pagination -->
        <div class="mt-8 bg-white rounded-xl p-6 shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all">
          <div id="paginationContainer" class="flex items-center justify-center gap-2 flex-wrap"></div>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
